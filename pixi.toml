[workspace]
authors = ["XXXX <XXX@XXX.com>"]
channels = ["conda-forge"]
name = "hyper-simulation"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test_llm = { cmd = "python tests/test_llm.py"}
gen_emb ={ cmd = "sh scripts/generate_embs.sh"}
base_line = {cmd = "sh scripts/base_line.sh"}
cdit ={ cmd = "sh scripts/cdit.sh"}
trim = {cmd = "python src/hyper_simulation/question_answer/get_trim.py"}
analysis = {cmd = "python src/hyper_simulation/question_answer/retrival/analysis.py"}
time_cost = {cmd = "python src/hyper_simulation/llm/time_cost.py"}
tool = {cmd = "python tests/test_tool.py"}
show = { cmd = "python src/hyper_simulation/question_answer/utils/show_task.py"}
rag = { cmd = [
    "python src/hyper_simulation/question_answer/rag.py",
    ]}
clean = { cmd = "python src/hyper_simulation/utils/clean.py"}

[dependencies]
pip = ">=25.0.1,<26"
libstdcxx-ng = ">=15.2.0,<16"
maturin = ">=1.8.3,<2"
python = ">=3.10,<3.12"

[pypi-dependencies]
thefuzz = ">=0.22.1, <0.23"

[feature.naive.dependencies]
python = "3.11.*"
faiss-cpu = { version = ">=1.9.0"}
maturin = ">=1.8.3,<2"

[feature.naive.pypi-dependencies]
hyper-simulation = { path = ".", editable = true }
tqdm = ">=4.67.1, <5"
torch = { version = ">=2.5.1", index = "https://download.pytorch.org/whl/cu121" }
contrievers = { path = "src/contrievers" , editable = true }
# numpy = ">=1.26.0,<2"
langchain = ">= 0.3.20"
langchain_ollama = ">= 1.0.0"
langchain-openai = ">=1.0.0"
langchain-community = "*"
beir = ">= 2.1.0"
matplotlib = ">=3.10.1, <4"
jsonlines = ">=4.0.0, <5"
colorama = ">=0.4.6, <0.5"
keyboard = ">=0.13.5, <0.14"
prompt-toolkit = ">=3.0.51, <4"
simulation-alg = { path = "src/simulation", editable = true }

[feature.hypergraph.dependencies]
python = "3.10.*"
setuptools = "<81"

[feature.hypergraph.pypi-dependencies]
hyper-simulation = { path = ".", editable = true }
aiohttp = "!=3.11.14"
spacy = "==3.4.1"
thefuzz = "==0.22.1"
nltk = "==3.9.2"
numpy = "==1.26.0"
fastcoref = "==2.1.6"
coreferee = "==1.4.1"
pywsd = "==1.2.5"
transformers = "==4.25.1"
spacy-transformers = "==1.1.9"
jsonlines = ">=4.0.0, <5"
langchain_core = "*"
cupy-cuda12x = ">=13.6.0, <14"
openai = ">=2.31.0, <3"

[feature.hypergraph.tasks]
dependency = { cmd = "python tests/test_dependency.py"}
build = { cmd = "python src/hyper_simulation/question_answer/rag_no_retrival.py --method hyper_simulation --build" }
test_build = { cmd = "python tests/test_hypergrah_gen.py"}
display = { cmd = "python tests/tools/spacy_debug.py" }
wordnet = { cmd = "python tests/tools/wordnet_X.py" }
linking = { cmd = "python src/hyper_simulation/hypergraph/linking.py" }
load = { cmd = "python tests/tools/build.py" }
musique = { cmd = "python tests/tasks/build_musique.py" }
hotpotqa = { cmd = "python tests/tasks/build_hotpotqa.py" }
legalbench = { cmd = "python tests/tasks/build_legalbench.py" }
multihop = { cmd = "python tests/tasks/build_multihop.py" }
arc = { cmd = "python tests/tasks/build_arc.py" }
contract_nli = { cmd = "python tests/tasks/build_contract_nli.py" }
docnli = { cmd = "python tests/tasks/build_docnli.py" }
econ = { cmd = "python tests/tasks/build_econ.py" }
control = { cmd = "python tests/tasks/build_control.py" }
count ={ cmd = "python tests/tasks/count_tokens.py" }
split ={ cmd = "python tests/tasks/split_chunk.py" }
by_token = { cmd = "python tests/tasks/build_by_token_len.py" }

[feature.simulation.dependencies]
python = "3.10.*"
sentencepiece = "*"
protobuf = "*"
[feature.simulation.pypi-dependencies]
hyper-simulation = { path = ".", editable = true }
simulation-alg = { path = "src/simulation", editable = true }
numpy = ">=1.26.2,<2"
nltk = ">=3.9.2, <4"
pywsd = ">=1.2.5, <2"
sentence-transformers = ">=5.2.0, <6"
modelscope = ">=1.34.0, <2"
langchain-ollama = ">=1.0.0"
spacy = ">=3.8.11, <4"
jsonlines = ">=4.0.0, <5"
openai = ">=2.30.0, <3"
faiss-gpu = ">=1.7.0" 
tiktoken = "*"
[feature.simulation.tasks]
pre = { cmd = "python tests/test_hypergraph.py"}
test_contradoc = { cmd = "python tests/test_contradoc.py" }
rag_no_retrival = { cmd = "python src/hyper_simulation/question_answer/rag_no_retrival.py" }
hyper_simulation = { cmd = "python src/hyper_simulation/question_answer/rag_no_retrival.py --method hyper_simulation --output_path /home/vincent/hyper-simulation/data/hyper_simulation" }
HotpotQA = {cmd = "python src/hyper_simulation/question_answer/rag_no_retrival.py --data_path /home/vincent/.dataset/HotpotQA/sample1000 --task hotpotqa"}
Musique = {cmd = "python src/hyper_simulation/question_answer/rag_no_retrival.py --data_path /home/vincent/.dataset/musique/sample3000 --task musique"}
MultiHop = {cmd = "python src/hyper_simulation/question_answer/rag_no_retrival.py --data_path /home/vincent/.dataset/MultiHop/sample2500 --task multihop"}
ARC = {cmd = "python src/hyper_simulation/question_answer/rag_no_retrival.py --data_path /home/vincent/hyper-simulation/data/retr_result/arc/arc_with_context.jsonl --task ARC"}
LegalBench = {cmd = "python src/hyper_simulation/question_answer/rag_no_retrival.py --data_path /home/vincent/.dataset/LegalBench/sample500 --task legalbench"}
test_nli = { cmd = "python tests/tools/nli.py" }
wordnet = { cmd = "python tests/tools/wordnet_show.py" }
linking = { cmd = "python src/hyper_simulation/hypergraph/linking.py" }
debug = { cmd = "python tests/tools/hyper.py" }
dump = { cmd = "python tests/tools/dump_hypergraph.py" }
enrich = { cmd = "python tests/tools/enrich.py" }
refine = { cmd = "python tests/tools/refine.py" }
title = { cmd = "python tests/tools/title.py" }
trans = { cmd = "python tests/tools/title_trans.py" }
remote = { cmd = "python tests/tasks/refine_hypergraph.py" }
check = { cmd = "python tests/tasks/support_check.py" }
migrate = { cmd = "python tests/tasks/migrate_vertex_types.py" }
decompose = { cmd = "python tests/tasks/decompose_question.py" }
decompose_multihop ={ cmd = "python tests/tasks/decompose_question_multihop.py" }
musique = { cmd = "python tests/tasks/musique.py" }
decompose_check ={ cmd = "python tests/tasks/check_decompose_structure.py" }
musique_baseline = { cmd = "python tests/tasks/musique_baseline.py" }
hotpotqa = { cmd = "python tests/tasks/hotpotqa.py" }
legalbench = { cmd = "python tests/tasks/legalbench.py" }
legalbench_baseline = { cmd = "python tests/tasks/legalbench_baseline.py" }
multihop = { cmd = "python tests/tasks/multihop.py" }
arc_baseline = { cmd = "python tests/tasks/arc_baseline.py" }
arc = { cmd = "python tests/tasks/arc.py" }
econ_baseline = { cmd = "python tests/tasks/econ_baseline.py" }
econ = { cmd = "python tests/tasks/econ.py" }
docnli_baseline = { cmd = "python tests/tasks/docnli_baseline.py" }
docnli = { cmd = "python tests/tasks/docnli.py" }
contract_nli_baseline = { cmd = "python tests/tasks/contra_nli_baseline.py" }
contract_nli = { cmd = "python tests/tasks/build_contract_nli.py" }
control = { cmd = "python tests/tasks/control.py" }
control_baseline = { cmd = "python tests/tasks/control_baseline.py" }
clean_contract_nli = { cmd = " python tests/tools/clean_contract_nli.py" }
split ={ cmd = "python tests/tasks/split_chunk.py" }
musique_time = { cmd = "python tests/tasks/musique_time.py" }
hotpotqa_time = { cmd = "python tests/tasks/hotpotqa_time.py" }
control_time = { cmd = "python tests/tasks/control_time.py" }
econ_time = { cmd = "python tests/tasks/econ_time.py" }
by_token = { cmd = "python tests/tasks/by_token_len_simulation.py" }
musique_split_time = { cmd = "python tests/tasks/musique_split_time.py" }
contract_nli_split_time = { cmd = "python tests/tasks/contract_nli_split_time.py" }
contradoc_time = { cmd = "python tests/tasks/contradoc_time.py" }

[environments]
hypergraph = { features = ["hypergraph"] }
simulation = { features = ["simulation"] }
default = { features = ["naive"] }
